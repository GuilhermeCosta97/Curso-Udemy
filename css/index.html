<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <!-- 3 internal css -->

    <style>
        p {
            color: gold;
            font-size: 40px;

        }
    </style>

    <!-- 4 external css -->
     <link rel="stylesheet" href="estilos/style.css">
     <link rel="stylesheet" href="estilos/lists.css">

</head>
<body>
    <!-- 1-inline css -->
     <h1 style="color: blue;">Mudar cor com inline</h1>
     <h1 style="color: red;">Outra cor </h1>

     <!-- 2- multiplas regras -->
     <h1 style="color: purple; font-size: 80px; border-bottom: 1px solid red;">Mudar cor e tamanho</h1>

    <!-- 3 internal css -->
    <p>Eu fui estilisado pelo internal</p>
    <p>Mais um</p>
    <p>Mais outro</p>  

    <!-- 4 external css -->
     <h3>Meu titulo verde</h3>

    <!-- 5 Ordem do css -->
     <p style="color: black;">Ordem do css</p> 
    
    <!-- 6 Multiplos css -->
    <ul>
        <li>Banana</li>
        <li>Mamao</li>
        <li>Laranja</li>
    </ul>  

    <!-- 7 classes -->
     <p class="paragraph">Algum texto</p>
     <p class="paragraph">Algum texto 2</p>
     <p class="paragraph">Algum texto 3</p>
     
    <!-- 8 ids -->
      <h1 id="exclusive-title">Titulo</h1>
     
</body>
</html>
