<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h2>Formularios em HTML</h2>
    <!-- Primeiro formulario -->
     <!-- Atributos do formulario -->
    <form action="register.php" method="get">
        <div>
            <label for="nome">Nome:</label>
            <input type="text">
        </div>
        <!-- Atributo name -->
        <!-- Atributo LABEL --> 
         <div>
            <label for="age">Idade:</label>
            <input type="text" name="age" >
         </div>
         <!-- Select -->
          <div>
            <label for="job">Selecione uma profissão:</label>
            <select name="job">
                <option value="programador">Programador</option>
                <option value="tester">Tester/QA</option>
                <option value="devops">Devops</option>
            </select>
          </div>
         <!-- Atributo selected -->
          <div>
            <label for="contratct">Você leu os termos do contrato ?</label>
            <select name="contract">
                <option value="sim">Sim</option>
                <option value="nao" selected>Não</option>
            </select>
          </div>

         <!-- Multiplas opções -->
          <div>
            <label for="items">
                <select name="items" multiple>
                    <option value="arroz">Arroz</option>
                    <option value="feijao">Feijão</option>
                    <option value="milho">Milho</option>
                    <option value="pera">Pera</option>
                </select>
            </label>
          </div>
          <!-- Textarea -->
           <div>
            <label for="coment">Deixe um comentario:</label>
            <textarea name="coment"></textarea>
           </div>
          <!-- Fieldset e legend -->
           <div>
            <fieldset>
                <legend>Preencha as suas informações:</legend>
                <label for="firstname">Nome:</label>
                <input type="firstname">
                <label for="lastname">Sobrenome:</label>
                <input type="lastname">
            </fieldset>
           </div>
           <!-- Datalist -->
           <div>
            <label for="flavor">Escolha uma sabor:</label>
            <input type="text" list="flavors" name="flavor">

            <datalist id="flavors">
                <option value="cereja"></option>
                <option value="chocolate"></option>
                <option value="flocos"></option>
                <option value="morango"></option>
            </datalist>
           </div>

           <!-- Input senhas-->
            <div>
                <label for="password">Digite sua senha:</label>
                <input type="password" name="password">
            </div>
           <!-- Radio button -->
            <div>
                <label for="car_model">Escolha o modelo do seu carro:</label>
                <div class="radio">
                    <input type="radio" value="Bmw" name="car_model">
                    <label for="Bmw">Bmw</label>
                </div>
                <div class="radio">
                    <input type="radio" value="Ferrari" name="car_model">
                    <label for="Ferrari">Ferrari</label>
                </div>
                <div class="radio">
                    <input type="radio" value="Mercedes" name="car_model">
                    <label for="Mercedes">Mercedes</label>
                </div>
                <div class="radio">
                    <input type="radio" value="Porshe" name="car_model">
                    <label for="Porshe">Porshe</label>
                </div>
            </div>
            <!-- Checkbox -->
             <div>
                <label for="optional">Opicionais de um carro:</label>
                <div class="radio">
                    <input type="checkbox" value="big_tiries" name="optiona{}">
                    <label for="big_tiries">Pneus grandes</label>
                </div>
                <div class="radio">
                    <input type="checkbox" value="turbo_engine" name="optiona{}">
                    <label for="turbo_engine">Motor turbo</label>
                </div>
                <div class="radio">
                    <input type="checkbox" value="hybrid" name="optiona{}">
                    <label for="hybrid">Hibrido</label>
                </div>
             </div>
             
            <!-- input data -->
             <div>
                <label for="birthday">Data de nascimento</label>
                <input type="date" name="birthday">
             </div>

            <!-- Enviando arquivos -->
             <div>
                <label for="image">Envie seu arquivo:</label>
                <input type="file" name="image">
             </div>
             
            <!-- Input para numeros -->
             <div>
                <label for="salary">Qual seu salario atual?</label>
                <input type="number" name="salary">
             </div>
             
            <!-- Input para email -->
             <div>
                <label for="email">Digite seu email:</label>
                <input type="email" name="email">
             </div>
             
            <!-- Atributo value -->
             <div>
                <label for="value">Digite um valor:</label>
                <input type="text" value="O valor é este 50" name="value">
             </div>

            <!-- Atributo disabled -->
             <div>
                <p>Tente mudar o valor</p>
                <input type="text" value="Não precisa preencher" disabled>
             </div>
             
            <!-- placeholder -->
             <div>
                <label for="currentjob">Digite a sua profissão:</label>
                <input type="text" name="currentjob" placeholder="No que você esta trabalhando agora ?">
             </div>
             
            <!-- Required -->
             <div>
                <label for="birthyear">Ano de nascimento:</label>
                <input type="text" name="birthyear" placeholder="Digite o ano do seu nascimento" required> 
             </div>
        <!-- Resetar form -->
         <input type="reset" value="limpar">    
        <!-- Enviando dados do formulario -->
         <input type="submit" value="Enviar"> 
    </form>
</body>
</html>
